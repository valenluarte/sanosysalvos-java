name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build user-service
        run: |
          cd user-service
          mvn clean package -DskipTests

      - name: Build pet-service
        run: |
          cd pet-service
          mvn clean package -DskipTests

      - name: Build report-service
        run: |
          cd report-service
          mvn clean package -DskipTests

      - name: Build matching-service
        run: |
          cd matching-service
          mvn clean package -DskipTests

      - name: Build Docker images
        run: docker-compose build

      - name: Start services
        run: docker-compose up -d

      - name: Wait for services
        run: sleep 30

      - name: Check services
        run: docker ps

      - name: Test user-service
        run: curl -f http://localhost:8082/users || exit 1

      - name: Test pet-service
        run: curl -f http://localhost:8083/pets || exit 1

      - name: Test report-service
        run: curl -f http://localhost:8084/reports || exit 1