name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Configurar JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Compilar user-service
        run: |
          cd user-service
          mvn clean package -DskipTests

      - name: Compilar pet-service
        run: |
          cd pet-service
          mvn clean package -DskipTests

      - name: Compilar report-service
        run: |
          cd report-service
          mvn clean package -DskipTests

      - name: Compilar matching-service
        run: |
          cd matching-service
          mvn clean package -DskipTests

      - name: Construir imágenes Docker
        run: docker compose build

      - name: Levantar servicios
        run: docker compose up -d

      - name: Esperar a que los servicios estén listos
        run: sleep 30

      - name: Verificar servicios
        run: docker compose ps

      - name: Ver logs de matching-service
        run: docker compose logs matching-service

      - name: Probar user-service
        run: curl -f http://localhost:8082/users || exit 1

      - name: Probar pet-service
        run: curl -f http://localhost:8083/pets || exit 1

      - name: Probar report-service
        run: curl -f http://localhost:8084/reports || exit 1

      - name: Probar matching-service
        run: |
          curl -f -X POST http://localhost:8085/matching \
            -H "Content-Type: application/json" \
            -d '{"petType":"Perro","petColor":"Dorado","petBreed":"Labrador","latitude":-33.456789,"longitude":-70.678901,"reportType":"LOST"}' || exit 1